<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earnings Intelligence</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f12;
      --surface:   #151820;
      --border:    #222530;
      --muted:     #2a2d3a;
      --text:      #e2e4ec;
      --subtle:    #6b7280;
      --accent:    #4f7fff;
      --accent-dim:#1e2d5a;
      --green:     #22c55e;
      --mono:      'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      --sans:      -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      --aapl:  #a3b8ff;
      --msft:  #4ec9b0;
      --googl: #fbbf24;
      --nvda:  #76e376;
      --other: #a78bfa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      max-width: 760px;
      margin-bottom: 40px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #fff;
    }
    .header p {
      margin-top: 6px;
      color: var(--subtle);
      font-size: 13px;
    }
    .header-meta {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .index-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--subtle);
      background: var(--surface);
    }
    .index-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    /* ── Query form ── */
    .card {
      width: 100%;
      max-width: 760px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 28px;
    }

    .field-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--subtle);
    }

    .field.grow { flex: 1; min-width: 0; }

    input[type="text"],
    select {
      background: var(--bg);
      border: 1px solid var(--muted);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    input[type="text"]:focus,
    select:focus {
      border-color: var(--accent);
    }
    select { cursor: pointer; }
    select option { background: #1a1d28; }

    #question-input {
      width: 100%;
      margin-bottom: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 20px;
      border-radius: 7px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      color: var(--subtle);
      border: 1px solid var(--muted);
    }
    .btn-ghost:hover { color: var(--text); border-color: #444; }

    /* ── Spinner ── */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result ── */
    #result {
      width: 100%;
      max-width: 760px;
      display: none;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .result-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .meta-pill {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--subtle);
      background: var(--surface);
    }
    .confidence-high  { border-color: #22c55e44; color: var(--green); }
    .confidence-medium { border-color: #fbbf2444; color: #fbbf24; }
    .confidence-low   { border-color: #ef444444; color: #ef4444; }

    .answer-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 24px;
      margin-bottom: 24px;
      font-size: 15px;
      line-height: 1.75;
      color: var(--text);
    }
    .answer-box p + p { margin-top: 12px; }

    /* Sources */
    .sources-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--subtle);
      margin-bottom: 12px;
    }

    .source-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .source-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .source-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--subtle);
      min-width: 28px;
    }
    .ticker-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 5px;
      letter-spacing: 0.5px;
    }
    .ticker-AAPL  { background: #1b2340; color: var(--aapl);  border: 1px solid #2a3a6a; }
    .ticker-MSFT  { background: #122422; color: var(--msft);  border: 1px solid #1e4040; }
    .ticker-GOOGL { background: #2a2010; color: var(--googl); border: 1px solid #4a3a10; }
    .ticker-NVDA  { background: #112211; color: var(--nvda);  border: 1px solid #1e3e1e; }
    .ticker-other { background: #201a30; color: var(--other); border: 1px solid #3a2a50; }

    .source-speaker {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }
    .source-role {
      font-size: 12px;
      color: var(--subtle);
    }
    .source-quarter {
      font-size: 11px;
      color: var(--subtle);
      margin-left: auto;
    }
    .section-tag {
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 4px;
      background: var(--muted);
      color: var(--subtle);
      letter-spacing: 0.3px;
    }
    .section-tag.qa { background: var(--accent-dim); color: #88aaff; }

    .source-text {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.65;
      color: #b0b8cc;
      padding: 12px 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .source-score {
      font-size: 10px;
      color: var(--subtle);
      padding: 6px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .score-bar-track {
      flex: 1;
      max-width: 80px;
      height: 3px;
      background: var(--muted);
      border-radius: 2px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--accent);
    }

    /* ── Error ── */
    .error-box {
      background: #1a0e0e;
      border: 1px solid #3d1a1a;
      border-radius: 10px;
      padding: 16px 20px;
      color: #f87171;
      font-size: 13px;
    }

    /* ── No-result ── */
    .empty-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 32px 20px;
      text-align: center;
      color: var(--subtle);
      font-size: 13px;
    }

    /* ── Suggested queries ── */
    .suggestions {
      width: 100%;
      max-width: 760px;
      margin-top: 8px;
    }
    .suggestions-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--subtle);
      margin-bottom: 10px;
    }
    .suggestions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 8px;
    }
    .suggestion-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 12.5px;
      color: var(--subtle);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      text-align: left;
      line-height: 1.5;
    }
    .suggestion-chip:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    /* ── API URL bar ── */
    .api-bar {
      width: 100%;
      max-width: 760px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
    }
    .api-bar label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--subtle);
      white-space: nowrap;
      font-weight: 600;
    }
    #api-url {
      flex: 1;
      font-family: var(--mono);
      font-size: 12px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>Earnings Intelligence</h1>
    <p>RAG-powered Q&amp;A over earnings call transcripts — grounded answers with source citations.</p>
    <div class="header-meta">
      <div class="index-badge"><span class="dot" style="background:var(--aapl)"></span> AAPL Q1 2026</div>
      <div class="index-badge"><span class="dot" style="background:var(--msft)"></span> MSFT Q2 2026</div>
      <div class="index-badge"><span class="dot" style="background:var(--googl)"></span> GOOGL Q4 2025</div>
      <div class="index-badge"><span class="dot" style="background:var(--nvda)"></span> NVDA Q4 2026</div>
      <div class="index-badge"><span class="dot" style="background:#444"></span> 88 chunks indexed</div>
    </div>
  </div>

  <!-- API URL config -->
  <div class="api-bar">
    <label>API</label>
    <input type="text" id="api-url" value="https://earnings-intelligence-production-42c7.up.railway.app" placeholder="https://your-api.railway.app" />
  </div>

  <!-- Query card -->
  <div class="card">
    <div class="field" style="margin-bottom: 14px;">
      <label>Question</label>
      <input type="text" id="question-input"
        placeholder="What did management say about gross margins?"
        autocomplete="off" />
    </div>
    <div class="field-row">
      <div class="field">
        <label>Ticker filter</label>
        <select id="ticker-filter">
          <option value="">All companies</option>
          <option value="AAPL">AAPL</option>
          <option value="MSFT">MSFT</option>
          <option value="GOOGL">GOOGL</option>
          <option value="NVDA">NVDA</option>
        </select>
      </div>
      <div class="field">
        <label>Section</label>
        <select id="section-filter">
          <option value="">All sections</option>
          <option value="prepared_remarks">Prepared remarks</option>
          <option value="qa">Q&amp;A</option>
        </select>
      </div>
      <div class="field">
        <label>Role</label>
        <select id="role-filter">
          <option value="">All speakers</option>
          <option value="CEO">CEO</option>
          <option value="CFO">CFO</option>
          <option value="Analyst">Analyst</option>
        </select>
      </div>
      <div style="display:flex; gap:8px; align-items:flex-end; margin-left:auto;">
        <button class="btn btn-ghost" id="clear-btn" onclick="clearResult()">Clear</button>
        <button class="btn btn-primary" id="submit-btn" onclick="submitQuery()">
          <span class="spinner" id="spinner"></span>
          <span id="btn-label">Ask</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Result area -->
  <div id="result"></div>

  <!-- Suggested queries -->
  <div class="suggestions" id="suggestions">
    <div class="suggestions-label">Try asking</div>
    <div class="suggestions-grid">
      <button class="suggestion-chip" onclick="fillQuery(this)">What did Apple's CEO say about iPhone revenue growth?</button>
      <button class="suggestion-chip" onclick="fillQuery(this)">How did Microsoft describe Azure growth in Q2?</button>
      <button class="suggestion-chip" onclick="fillQuery(this)">What are the key risks management highlighted?</button>
      <button class="suggestion-chip" onclick="fillQuery(this)">What guidance was given for the next quarter?</button>
      <button class="suggestion-chip" onclick="fillQuery(this)">What did analysts ask about margins during Q&amp;A?</button>
      <button class="suggestion-chip" onclick="fillQuery(this)">How did Apple describe the services segment performance?</button>
    </div>
  </div>

  <script>
    const questionInput = document.getElementById('question-input');
    const submitBtn     = document.getElementById('submit-btn');
    const spinner       = document.getElementById('spinner');
    const btnLabel      = document.getElementById('btn-label');
    const resultDiv     = document.getElementById('result');
    const suggestions   = document.getElementById('suggestions');

    questionInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitQuery(); }
    });

    function fillQuery(chip) {
      questionInput.value = chip.textContent.trim();
      questionInput.focus();
    }

    function clearResult() {
      resultDiv.style.display = 'none';
      resultDiv.innerHTML = '';
      questionInput.value = '';
      document.getElementById('ticker-filter').value = '';
      document.getElementById('section-filter').value = '';
      document.getElementById('role-filter').value = '';
      suggestions.style.display = '';
    }

    function setLoading(on) {
      spinner.style.display = on ? 'block' : 'none';
      btnLabel.textContent  = on ? 'Thinking…' : 'Ask';
      submitBtn.disabled    = on;
    }

    function tickerClass(ticker) {
      const known = ['AAPL','MSFT','GOOGL','NVDA'];
      return known.includes(ticker) ? `ticker-${ticker}` : 'ticker-other';
    }

    function confidenceClass(score) {
      if (score >= 0.75) return 'confidence-high';
      if (score >= 0.45) return 'confidence-medium';
      return 'confidence-low';
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    function renderAnswer(data) {
      if (!data.found) {
        return `<div class="empty-box">No relevant transcript excerpts found for this query.<br>
          Try broadening your question or removing filters.</div>`;
      }

      const conf       = data.confidence ?? 0;
      const confLabel  = conf >= 0.75 ? 'High confidence' : conf >= 0.45 ? 'Medium confidence' : 'Low confidence';
      const confCls    = confidenceClass(conf);

      // Answer paragraphs
      const answerHtml = escHtml(data.answer)
        .split(/\n\n+/)
        .filter(p => p.trim())
        .map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`)
        .join('');

      // Sources
      const sourcesHtml = (data.sources || []).map((s, i) => {
        const section    = s.section === 'qa' ? 'Q&amp;A' : 'Prepared Remarks';
        const sectionCls = s.section === 'qa' ? 'qa' : '';
        const score      = (s.score ?? 0);
        const scorePct   = Math.round(score * 100);
        const firmPart   = s.firm ? ` · ${escHtml(s.firm)}` : '';
        const rolePart   = s.role ? escHtml(s.role) : '';
        return `
          <div class="source-card">
            <div class="source-header">
              <span class="source-num">[${i + 1}]</span>
              <span class="ticker-badge ${tickerClass(s.ticker)}">${escHtml(s.ticker)}</span>
              <span class="source-speaker">${escHtml(s.speaker || 'Unknown')}</span>
              <span class="source-role">${rolePart}${firmPart}</span>
              <span class="section-tag ${sectionCls}">${section}</span>
              <span class="source-quarter">${escHtml(s.quarter || '')}</span>
            </div>
            <div class="source-text">${escHtml(s.text)}</div>
            <div class="source-score">
              Relevance ${scorePct}%
              <div class="score-bar-track">
                <div class="score-bar-fill" style="width:${scorePct}%"></div>
              </div>
              <span style="color:#444">·</span>
              ${escHtml(s.chunk_id || '')}
            </div>
          </div>`;
      }).join('');

      return `
        <div class="result-header">
          <div class="result-meta">
            <span class="meta-pill ${confCls}">${confLabel}</span>
            <span class="meta-pill">${data.chunks_used ?? 0} chunks</span>
            <span class="meta-pill">${escHtml(data.model || '')}</span>
          </div>
        </div>
        <div class="answer-box">${answerHtml}</div>
        ${data.sources && data.sources.length
          ? `<div class="sources-label">Sources — ${data.sources.length} excerpt${data.sources.length !== 1 ? 's' : ''}</div>${sourcesHtml}`
          : ''}`;
    }

    async function submitQuery() {
      const question = questionInput.value.trim();
      if (!question) { questionInput.focus(); return; }

      const apiBase = document.getElementById('api-url').value.trim().replace(/\/$/, '');
      const body = { question };
      const ticker  = document.getElementById('ticker-filter').value;
      const section = document.getElementById('section-filter').value;
      const role    = document.getElementById('role-filter').value;
      if (ticker)  body.ticker  = ticker;
      if (section) body.section = section;
      if (role)    body.role    = role;

      setLoading(true);
      suggestions.style.display = 'none';
      resultDiv.style.display   = 'none';
      resultDiv.innerHTML       = '';

      try {
        const res = await fetch(`${apiBase}/query`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(body),
        });

        if (!res.ok) {
          let detail = `HTTP ${res.status}`;
          try { const j = await res.json(); detail = j.detail || detail; } catch (_) {}
          throw new Error(detail);
        }

        const data = await res.json();
        resultDiv.innerHTML       = renderAnswer(data);
        resultDiv.style.display   = 'block';
      } catch (err) {
        resultDiv.innerHTML     = `<div class="error-box"><strong>Error:</strong> ${escHtml(err.message)}</div>`;
        resultDiv.style.display = 'block';
        suggestions.style.display = '';
      } finally {
        setLoading(false);
      }
    }
  </script>
</body>
</html>
